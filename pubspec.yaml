name: backoffice_admin_app
description: BackOffice Admin Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.10

  # Biometria
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: macos/Runner/Assets.xcassets/AppIcon.appiconset/ic_launcher.png
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: macos/Runner/Assets.xcassets/AppIcon.appiconset/ic_launcher.png

flutter:
  uses-material-design: true
